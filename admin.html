<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #ffe6f0, #fff0f5);
            font-family: Arial, sans-serif;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .login-box h2 {
            margin-bottom: 20px;
            color: #d63384;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #f3c2d3;
            outline: none;
        }

        .login-box button {
            width: 100%;
            padding: 10px;
            border: none;
            background: #f06292;
            color: white;
            border-radius: 10px;
            cursor: pointer;
        }

        .login-box button:hover {
            background: #ec407a;
        }

        .error {
            color: red;
            font-size: 13px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Admin Login</h2>

    <input type="password" id="adminPass" placeholder="Enter password">

    <button onclick="login()">Login</button>

    <p class="error" id="error"></p>
</div>

<script>
function login() {
    let pass = document.getElementById("adminPass").value;
    let error = document.getElementById("error");

    const ADMIN_PASSWORD = "1234";

    if (pass === ADMIN_PASSWORD) {
        // 🔐 Save login ONLY for this session (more secure than localStorage)
        sessionStorage.setItem("admin", "true");

        // go to dashboard
        window.location.href = "dashboard.html";
    } else {
        error.innerText = "Incorrect password";
    }
}
</script>

</body>
</html>
